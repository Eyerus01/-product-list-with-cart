<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor | Product list with cart</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <main class="page-layout">
      <section class="products">
        <header class="section-heading">
          <h1>Desserts</h1>
          <p class="section-description">Choose your favourite sweet treat and add it to the cart.</p>
        </header>
        <div class="product-grid" id="productGrid"></div>
      </section>

      <aside class="cart-panel" aria-label="Shopping cart">
        <div class="cart-card">
          <div class="cart-header">
            <h2>Your Cart <span id="cartCount">(0)</span></h2>
          </div>
          <div class="cart-items" id="cartItems">
            <p class="cart-empty">Your added items will appear here.</p>
          </div>

          <div class="order-summary">
            <p class="summary-label">Order Total</p>
            <p class="summary-value" id="orderTotal">$0.00</p>
          </div>

          <button class="confirm-button" id="confirmOrderButton" type="button" disabled>
            Confirm Order
          </button>
        </div>
      </aside>
    </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </div>

  <div class="modal hidden" id="confirmationModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-panel">
      <div class="modal-icon" aria-hidden="true">✓</div>
      <h2 id="modalTitle">Order Confirmed</h2>
      <p class="modal-copy">We hope you enjoy your food!</p>

      <div class="checkout-summary" id="confirmationList"></div>

      <div class="checkout-total">
        <p>Order Total</p>
        <p class="checkout-value" id="checkoutTotal">$0.00</p>
      </div>

      <button class="confirm-button confirm-again" id="startNewOrderButton" type="button">
        Start New Order
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
